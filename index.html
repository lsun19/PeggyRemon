        // Animation variables
        let currentFrame = 0;
        const frameDelay = 100; // milliseconds

        // DOM element
        const display = document.getElementById('ascii-display');

        // Display a specific frame
        function displayFrame(frameIndex) {
            if (frameIndex >= 0 && frameIndex < asciiFrames.length) {
                display.textContent = asciiFrames[frameIndex].join('\n');
                currentFrame = frameIndex;
            }
        }

        // Animation loop
        function animate() {
            currentFrame = (currentFrame + 1) % asciiFrames.length;
            displayFrame(currentFrame);
        }

        // Start animation
        function startAnimation() {
            if (asciiFrames.length > 0) {
                displayFrame(0);
                setInterval(animate, frameDelay);
            }
        }

        // Start animation on load
        startAnimation();
